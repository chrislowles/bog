# This is a Universal Blue recipe for building custom images
# See https://blue-build.org/ for more information

name: bog
description: A barebones immutable Linux distro with minimal GNOME
base-image: ghcr.io/ublue-os/base-main
image-version: 42

modules:
  - type: rpm-ostree
    repos:
      # Any custom repos you need
    install:
      # Desktop Components
      - NetworkManager-wifi
      - NetworkManager-wwan
      - NetworkManager-tui
      - gnome-shell
      - gdm
      - gnome-session
      - gnome-settings-daemon
      - gnome-keyring
      - xdg-desktop-portal-gnome
      - xdg-user-dirs-gtk
      - gnome-terminal
      - gnome-control-center
      - gnome-system-monitor
      - nautilus
      - gnome-text-editor
      - gnome-disk-utility
      - gnome-logs
      - baobab
      - dconf-editor
      # Media Codecs
      - gstreamer1-plugins-base
      - gstreamer1-plugins-good
      - gstreamer1-plugins-bad-free
      # Fonts
      - google-noto-sans-fonts
      - google-noto-serif-fonts
      - google-noto-emoji-fonts
      - liberation-fonts
      # Container Management
      - distrobox
    remove:
      - toolbox

  - type: default-flatpaks
    notify: true
    system:
      repo-url: https://flathub.org/repo/flathub.flatpakrepo
      repo-name: flathub

  - type: files
    files:
      - source: distrobox.ini
        destination: /etc/distrobox/distrobox.ini

  - type: signing