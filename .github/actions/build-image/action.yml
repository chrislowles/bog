name: Build Image
description: Builds a custom immutable OS image

inputs:
  image-name:
    description: 'Name of the image'
    required: true
  image-suffix:
    description: 'Suffix for the image variant'
    required: true
  containerfile:
    description: 'Path to Containerfile'
    required: true
  build-args:
    description: 'List of build-time variables'
    required: false

runs:
  using: composite
  steps:
    - name: Generate image metadata
      shell: bash
      run: |
        echo "IMAGE_NAME=${{ inputs.image-name }}" >> $GITHUB_ENV
        echo "IMAGE_TAG=$(date +%Y%m%d)" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ${{ inputs.containerfile }}
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
          ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ env.IMAGE_TAG }}
        labels: |
          org.opencontainers.image.title=${{ inputs.image-name }}
          org.opencontainers.image.description=Custom immutable OS - ${{ inputs.image-suffix }} variant
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha
        cache-to: type=gha,mode=max