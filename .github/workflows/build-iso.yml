name: Build ISOs

on:
  workflow_dispatch:
  # You can uncomment the lines below to automate builds when you create a new release
  # release:
  #   types: [published]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives the action permission to write to your Releases tab.
      packages: read
    
    strategy:
      fail-fast: false
      matrix:
        image_name: [bog, bog-nvidia]
        major_version: [40] 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.2.2
        id: build
        with:
          arch: x86_64
          image_name: ${{ matrix.image_name }}
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: ${{ matrix.major_version }}
          iso_name: ${{ matrix.image_name }}.iso

      - name: Upload ISO to Releases Tab
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.image_name }}.iso
          tag_name: latest-iso
          name: "Latest ISO Build"
          body: "Automated ISO build for ${{ matrix.image_name }}."