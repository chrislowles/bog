name: generate-iso
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'recipes/**'

jobs:
  iso:
    name: Create and Upload ISO
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # stop GH from cancelling all matrix builds if one fails
      matrix:
        image:
          - bog
          - bog-nvidia
    steps:
      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: iso
        with:
          arch: x86_64
          image_name: ${{ matrix.image }}
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: latest
          iso_name: ${{ matrix.image }}-latest.iso
          variant: silverblue  # Adjust based on base-image; for bog it's base-main, but try silverblue or kinoite equivalent

      - name: Generate CHECKSUM
        run: |
          cd ${{ steps.iso.outputs.iso_path }}
          sha256sum ${{ steps.iso.outputs.iso_name }} > ${{ steps.iso.outputs.iso_name }}-CHECKSUM

      - name: Upload ISO to Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: iso-${{ github.sha }}
          name: ${{ matrix.image }} ISO
          files: |
            ${{ steps.iso.outputs.iso_path }}/${{ steps.iso.outputs.iso_name }}
            ${{ steps.iso.outputs.iso_path }}/${{ steps.iso.outputs.iso_name }}-CHECKSUM
          overwrite: true
          body: |
            Automated ISO for ${{ matrix.image }} built from main.

      - name: Upload as Artifact (for PRs)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}-iso
          path: |
            ${{ steps.iso.outputs.iso_path }}/${{ steps.iso.outputs.iso_name }}
            ${{ steps.iso.outputs.iso_path }}/${{ steps.iso.outputs.iso_name }}-CHECKSUM
          retention-days: 7
