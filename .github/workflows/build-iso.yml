name: Build and Release ISOs

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-isos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    strategy:
      fail-fast: false # don't cancel bog-nvidia just because bog failed (or vice versa)
      matrix:
        image_name: [bog, bog-nvidia]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.4.0
        id: build
        with:
          arch: x86_64
          image_name: ${{ matrix.image_name }}
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: 43
          variant: Silverblue
          iso_name: ${{ matrix.image_name }}-installer.iso

      - name: Upload ISO to GitHub Release
        uses: softprops/action-gh-release@v3
        if: github.event_name == 'release'
        with:
          files: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}