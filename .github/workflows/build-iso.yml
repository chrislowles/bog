name: Build ISOs

on:
  workflow_dispatch:
  # You can uncomment the lines below to automate builds when you create a new release
  # release:
  #   types: [published]

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives the action permission to write to your Releases tab.
      packages: read
    
    strategy:
      fail-fast: false
      matrix:
        image_name: [bog, bog-nvidia]
        # We removed the hardcoded major_version here to dynamically retrieve it below.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Extract Fedora Version from Image
        id: get_version
        run: |
          # Pull the latest image to inspect it
          docker pull ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:latest
          
          # Read the version directly from the image's os-release file
          FEDORA_VERSION=$(docker run --rm ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}:latest bash -c 'source /etc/os-release && echo $VERSION_ID')
          
          # Pass the extracted version variable to the next step
          echo "version=$FEDORA_VERSION" >> $GITHUB_OUTPUT

      - name: Build ISO
        uses: jasonn3/build-container-installer@main
        id: build
        with:
          arch: x86_64
          image_name: ${{ matrix.image_name }}
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          # Utilize the dynamically extracted version 
          version: ${{ steps.get_version.outputs.version }}
          iso_name: ${{ matrix.image_name }}.iso

      - name: Upload ISO to Releases Tab
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.image_name }}.iso
          tag_name: latest-iso
          name: "Latest ISO Build"
          body: "Automated ISO build for ${{ matrix.image_name }}."