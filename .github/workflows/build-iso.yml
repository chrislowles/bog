name: Build ISOs

permissions:
  contents: write  # For releases
  packages: read   # For image pull

on:
  schedule:
    - cron: "00 10 * * 1"  # Weekly (Monday 10AM UTC) - adjust as needed
  push:
    branches: [main]
    paths:
      - 'files/**'
      - 'recipes/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-iso:
    name: Build ISO for ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - bog
          - bog-nvidia
        include:
          - image: bog
            fedora_version: 44  # Update to match your recipe/base-main
          - image: bog-nvidia
            fedora_version: 44

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set build date
        run: echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Build netinstall ISO
        uses: jasonn3/build-container-installer@main
        id: iso
        with:
          arch: x86_64
          image_name: ${{ matrix.image }}
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: ${{ matrix.fedora_version }}
          iso_name: ${{ matrix.image }}-${{ env.BUILD_DATE }}.iso
          variant: base  # Or 'silverblue'/'kinoite' — test via workflow_dispatch if needed
          # Netinstall optimizations (small ISO)
          rootfs_size: "2" # GiB for squashfs
          enable_cache_dnf: "true"
          enable_cache_skopeo: "true"

      - name: Generate CHECKSUM
        run: |
          cd ${{ steps.iso.outputs.iso_path }}
          sha256sum ${{ steps.iso.outputs.iso_name }} > ${{ steps.iso.outputs.iso_name }}.sha256

      - name: Upload ISO to GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: iso-${{ env.BUILD_DATE }}
          name: ${{ matrix.image }} ISO ${{ env.BUILD_DATE }}
          body: |
            Automated netinstall ISO for **${{ matrix.image }}**.
            - Built from `main` on ${{ env.BUILD_DATE }}.
            - Pulls latest layers during install (smaller download).
            - SHA256: See attached checksum.
          files: |
            ${{ steps.iso.outputs.iso_path }}/${{ steps.iso.outputs.iso_name }}
            ${{ steps.iso.outputs.iso_path }}/${{ steps.iso.outputs.iso_name }}.sha256
          overwrite: true  # Update existing tag if re-run

      - name: Upload as Artifact (PRs / debug)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image }}-iso-${{ env.BUILD_DATE }}
          path: |
            ${{ steps.iso.outputs.iso_path }}/${{ steps.iso.outputs.iso_name }}
            ${{ steps.iso.outputs.iso_path }}/${{ steps.iso.outputs.iso_name }}.sha256
          retention-days: 14