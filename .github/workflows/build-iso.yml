name: Build and Release ISOs

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-isos:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        image_name: [bog, bog-nvidia]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Free disk space
        uses: jlumbroso/free-disk-space@1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.5.0
        id: build
        with:
          arch: x86_64
          image_name: ${{ matrix.image_name }}
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: 43
          variant: Silverblue
          iso_name: ${{ matrix.image_name }}-installer.iso

      - name: Upload ISO to GitHub Release
        uses: softprops/action-gh-release@v3.0.2
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        with:
          files: |
            ${{ steps.build.outputs.iso_path }}/${{ steps.build.outputs.iso_name }}
          tag_name: ${{ github.event.release.tag_name || format('v{0}', github.run_number) }}
          name: ${{ github.event.release.name || format('{0} {1}', matrix.image_name, github.run_number) }}
          body: |
            Automated ISO build for ${{ matrix.image_name }}
            Built on: ${{ github.event.repository.updated_at }}