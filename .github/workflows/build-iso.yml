name: Build ISO Images

on:
  schedule:
    - cron: '0 2 * * 1'  # 2 AM every Monday
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  FEDORA_VERSION: 42

jobs:
  build-iso-nvidia:
    name: Build NVIDIA ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate ISO timestamp
        id: timestamp
        run: echo "iso_timestamp=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Build NVIDIA ISO
        uses: jasonn3/build-container-installer@v1.4.0
        id: build
        with:
          arch: x86_64
          image_name: bog-nvidia
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: ${{ env.FEDORA_VERSION }}
          variant: Server
          iso_name: bog-nvidia-${{ steps.timestamp.outputs.iso_timestamp }}.iso

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bog-nvidia-iso-${{ steps.timestamp.outputs.iso_timestamp }}
          path: ${{ steps.build.outputs.iso_path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload ISO checksum
        uses: actions/upload-artifact@v4
        with:
          name: bog-nvidia-checksum-${{ steps.timestamp.outputs.iso_timestamp }}
          path: ${{ steps.build.outputs.iso_path }}-CHECKSUM
          if-no-files-found: error
          retention-days: 7

  build-iso-amd:
    name: Build AMD ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate ISO timestamp
        id: timestamp
        run: echo "iso_timestamp=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Build AMD ISO
        uses: jasonn3/build-container-installer@v1.4.0
        id: build
        with:
          arch: x86_64
          image_name: bog-amd
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: ${{ env.FEDORA_VERSION }}
          variant: Server
          iso_name: bog-amd-${{ steps.timestamp.outputs.iso_timestamp }}.iso

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bog-amd-iso-${{ steps.timestamp.outputs.iso_timestamp }}
          path: ${{ steps.build.outputs.iso_path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload ISO checksum
        uses: actions/upload-artifact@v4
        with:
          name: bog-amd-checksum-${{ steps.timestamp.outputs.iso_timestamp }}
          path: ${{ steps.build.outputs.iso_path }}-CHECKSUM
          if-no-files-found: error
          retention-days: 7

  build-iso-vm:
    name: Build VM ISO
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate ISO timestamp
        id: timestamp
        run: echo "iso_timestamp=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Build VM ISO
        uses: jasonn3/build-container-installer@v1.4.0
        id: build
        with:
          arch: x86_64
          image_name: bog-vm
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: ${{ env.FEDORA_VERSION }}
          variant: Server
          iso_name: bog-vm-${{ steps.timestamp.outputs.iso_timestamp }}.iso

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bog-vm-iso-${{ steps.timestamp.outputs.iso_timestamp }}
          path: ${{ steps.build.outputs.iso_path }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload ISO checksum
        uses: actions/upload-artifact@v4
        with:
          name: bog-vm-checksum-${{ steps.timestamp.outputs.iso_timestamp }}
          path: ${{ steps.build.outputs.iso_path }}-CHECKSUM
          if-no-files-found: error
          retention-days: 7

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-iso-nvidia, build-iso-amd, build-iso-vm]
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate release info
        id: release-info
        run: |
          echo "release_date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "release_tag=v$(date +%Y.%m.%d)" >> $GITHUB_OUTPUT
          echo "release_name=Weekly ISO Build - $(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./isos

      - name: Create release notes
        run: |
          cat > release_notes.md << 'EOF'
          # Bog ISO Images - ${{ steps.release-info.outputs.release_date }}
          
          Weekly automated builds of Bog installation ISOs for all variants.
          
          ## Available Variants
          
          ### bog-nvidia
          - Pre-installed NVIDIA drivers (kernel module + addons)
          - NVIDIA power management services enabled
          - Optimized for NVIDIA GPUs
          
          ### bog-amd
          - Mesa drivers (included in base image)
          - Optimized for AMD GPUs
          
          ### bog-vm
          - QEMU guest agent, Open VM Tools, SPICE VDAgent
          - Optimized for virtualized workflows/VMs
          
          ## Installation Instructions
          
          1. Download the appropriate ISO for your hardware
          2. Verify the checksum (CHECKSUM file provided)
          3. Create bootable media:
             - **Linux**: `sudo dd if=bog-VARIANT-DATE.iso of=/dev/sdX bs=4M status=progress && sync`
             - **Windows**: Use Rufus or Etcher
             - **macOS**: Use Etcher or `dd` command
          4. Boot from the media and follow the installation wizard
          
          ## Checksum Verification
          
          Each ISO includes a CHECKSUM file. To verify on Linux:
          ```bash
          sha256sum -c bog-VARIANT-DATE.iso-CHECKSUM
          ```
          
          ## Build Information
          
          - Build Date: $(date +%Y-%m-%d)
          - Base Image: Universal Blue base-main (Fedora Atomic)
          - Desktop Environment: GNOME (minimal installation)
          - Package Management: Flatpak (Flathub pre-configured) + Distrobox
          
          ## First Boot
          
          After installation:
          1. Complete the initial setup wizard
          2. Flatpak/Flathub is ready to use immediately
          3. Install apps with: `flatpak install flathub <app-id>`
          4. Create containers with: `distrobox create`
          
          For detailed documentation, see the [README](https://github.com/${{ github.repository }}/blob/main/README.md).
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release-info.outputs.release_tag }}
          name: ${{ steps.release-info.outputs.release_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            ./isos/**/*.iso
            ./isos/**/*-CHECKSUM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}