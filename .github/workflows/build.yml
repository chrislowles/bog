name: Build Custom Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  # Central version definition to keep Base and NVIDIA images in sync
  FEDORA_VERSION: 42

jobs:
  # 1. Build the Base (AMD) Image First
  build-amd:
    name: Build AMD (Base) Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build AMD Image
        uses: ./.github/actions/build-image
        with:
          image-name: bog-amd
          image-suffix: amd
          # Point this to the main Containerfile (the base)
          containerfile: Containerfile
          # Pass the specific Fedora version to the base image
          build-args: |
            IMAGE_TAG=${{ env.FEDORA_VERSION }}

  # 2. Build NVIDIA Image (Depends on AMD)
  build-nvidia:
    name: Build NVIDIA Image
    needs: build-amd  # WAIT for base image to finish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build NVIDIA Image
        uses: ./.github/actions/build-image
        with:
          image-name: bog-nvidia
          image-suffix: nvidia
          containerfile: Containerfile.nvidia
          # FIX: Use 'latest' tag since that's what the AMD build creates
          build-args: |
            FEDORA_MAJOR_VERSION=${{ env.FEDORA_VERSION }}
            FROM_IMAGE=ghcr.io/${{ github.repository_owner }}/bog-amd:latest

  # 3. Build VM Image (Depends on AMD)
  build-vm:
    name: Build VM Image
    needs: build-amd  # WAIT for base image to finish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build VM Image
        uses: ./.github/actions/build-image
        with:
          image-name: bog-vm
          image-suffix: vm
          containerfile: Containerfile.vm
          # FIX: Use 'latest' tag since that's what the AMD build creates
          build-args: |
            IMAGE_TAG=latest
            FROM_IMAGE=ghcr.io/${{ github.repository_owner }}/bog-amd:latest