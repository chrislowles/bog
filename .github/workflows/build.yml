name: Build Custom Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 2'  # Midnight on a Tuesday
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-nvidia:
    name: Build NVIDIA Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build NVIDIA Image
        uses: ./.github/actions/build-image
        with:
          image-name: bog-nvidia
          image-suffix: nvidia
          containerfile: Containerfile.nvidia

  build-amd:
    name: Build AMD Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build AMD Image
        uses: ./.github/actions/build-image
        with:
          image-name: bog-amd
          image-suffix: amd
          containerfile: Containerfile.amd

  build-vm:
    name: Build VM Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build VM Image
        uses: ./.github/actions/build-image
        with:
          image-name: bog-vm
          image-suffix: vm
          containerfile: Containerfile.vm