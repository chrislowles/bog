---
modules:

  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:

        # GNOME Core (Minimal)
        - gnome-shell                       # Desktop Interface
        - gnome-session-wayland-session     # Wayland Session
        - gdm                               # Login Manager
        - gnome-control-center              # Settings
        - gnome-system-monitor              # Task manager
        - gnome-settings-daemon             # Hardware management
        - dconf                             # Basically GNOMEs version of registry keys
        - dconf-editor                      # Basically GNOMEs version of registry editor

        # Filesystem
        - gvfs                              # Virtual Filesystem (Trash/Mounts)
        - gvfs-afc                          # AFC support for gvfs
        - gvfs-afp                          # AFP support for gvfs
        - gvfs-archive                      # Archiving support for gvfs
        - gvfs-client                       # Client modules of backends for the gio framework in GLib
        - gvfs-fuse                         # FUSE support for gvfs
        - gvfs-goa                          # GOA support for gvfs
        - gvfs-gphoto2                      # gphoto2 support for gvfs
        - gvfs-mtp                          # MTP support for gvfs
        - gvfs-nfs                          # NFS support for gvfs
        - gvfs-smb                          # SMD support for gvfs

        # Essential Interface & Tools
        - gnome-online-accounts             # GOA daemon
        - xdg-desktop-portal-gnome          # XDG Portal for GNOME
        - gnome-keyring                     # Password/Key Management
        - gnome-disk-utility                # GNOME Disks
        - baobab                            # Dir tree analyzer
        - gnome-logs                        # SystemD log viewer
        - gnome-font-viewer                 # Font viewer/installer
        - gnome-console                     # Terminal emulator
        - nautilus                          # File manager
        - gnome-text-editor                 # GUI Text editor

        # Niceties
        - gnome-backgrounds

        # Utilities for System Management Beyond Flatpaks (idk how to describe this lol)
        - distrobox                         # Container-based system management
        - host-spawn                        # distrobox-host-exec dep
        - steam                             # Primary gaming platform
        - system-reinstall-bootc            # Effective system reset via bootc

        # Misc Utilities
        - micro                             # TUI Text Editor
        - curl                              # CLI for http transfer/download
        - wget                              # The other CLI for http transfer/download
        - git                               # Version control system
        - yt-dlp                            # CLI media downloader
        - ffmpeg                            # Suite of media processing libraries
        #- ffprobe                          # Multimedia analysis tool
        - fastfetch                         # System information readout (neofetch-like)
        - rsync                             # Common program for network syncing files
        - rclone                            # Cloud storage rsync

        # Networking
        - NetworkManager-wifi               # Primary tooling for WiFi support

        # X11 (mostly for debugging when patching/pre-configuring fixes for flatpaks)
        - xprop
        - xlsclients
        - xdotool

        # Podman
        - podman                            # Should already be present on ublue base, included just in case
        - podman-compose                    # Fallback CLI if ever needed
        - slirp4netns                       # Rootless networking
        - fuse-overlayfs                    # Rootless storage driver

        # Plymouth
        - plymouth
        - plymouth-system-theme
        #- plymouth-plugin-two-step

        # AppImages
        #- fuse # FUSE 3 (likely already present in base)
        #- fuse2 # needed by most AppImages anyway
        - vulkan-loader
        - vulkan-tools

        # Broad system runtime dependencies (formerly source-built Bazaar dependencies)
        - flatpak
        - appstream
        - libsoup3
        - json-glib
        - libsecret
        - libxmlb
        - libyaml

    remove:
      packages:
        - toolbox
        - htop
        #- fedora-release-identity-basic
        #- fedora-logos
        - fedora-bookmarks

  - type: script
    scripts:
      - setup-podman.sh
      - setup-os-release.sh

  - type: bling
    install:
      - dconf-update-service

  - type: systemd
    user:
      enabled:
        # Noticed a quirk with Bazaar when experimenting with the default-flatpaks key,
        # clearing cache after reverting fixed it so I'm setting as a user service.
        # Basically a cache clear is now intended to be apart of an image update now.
        # UPDATE: merged this with the actual Bazaar cache clean run and made it an overall "springcleaning" service
        # TODO: consider user and system versions of these services/scripts
        - springclean.service
    system:
      enabled:
        - gdm.service

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
            # the app store itself
            - io.github.kolunmi.Bazaar

            # Suggested pre-installed system programs
            - com.github.tchx84.Flatseal
            - com.ranfdev.DistroShelf
            - io.github.flattool.Ignition
            - com.mattjakeman.ExtensionManager
            - io.github.celluloid_player.Celluloid
            - com.vysp3r.ProtonPlus
            - com.github.mtkennerly.ludusavi
            - com.usebottles.bottles
            - me.timschneeberger.jdsp4linux

            # Pre-installed selection from GNOME Bazaar curation group
            - org.gnome.Contacts
            - org.gnome.Calendar
            - org.gnome.clocks
            - org.gnome.SoundRecorder
            - org.gnome.Decibels
            - org.gnome.Snapshot
            - org.gnome.Characters
            - org.gnome.SimpleScan

            # Pre-installed selection from other curated groups
            - org.mozilla.firefox
            - org.qbittorrent.qBittorrent

  - type: gnome-extensions
    install:
      - 615   # AppIndicator Support
      #- 1160  # Dash to Panel
      #- 1319  # GSConnect
      #- 36    # Lock Keys
      #- 5904  # Volume Scroller
      #- 779   # Clipboard Indicator
      - 517   # Caffeine
      #- 8     # Places Menu
      #- 5263  # GTK Desktop Icons NG (DING)
      #- 600   # Launch New Instance
      #- 9419  # Video Lockscreen

  # I'd like to somehow pre-install Comic Sans in this, legally ofc lmao
  - type: fonts
    fonts:
      google-fonts:
        - Inter
        - Comic Neue
      #url-fonts:
      #  - name: CustomFont
      #    url: https://example.com/my-font.otf
      #  - name: CompanyFonts
      #    url: https://company.com/fonts.tar.gz

  # Plymouth theming stuff
  - type: initramfs

  - type: signing