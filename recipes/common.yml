---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:

  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        # Primary Hyprland COPR for Fedora — provides hyprland, hyprpaper, hypridle, hyprlock, and related packages
        - solopasha/hyprland
        - errornointernet/packages
    install:
      packages:

        # Hyprland Compositor & Ecosystem
        - hyprland                          # Wayland compositor
        - hyprpaper                         # Wallpaper daemon
        - hypridle                          # Idle management daemon
        - hyprlock                          # Screen locker
        - waybar                            # Status bar
        - wofi                              # App launcher (dmenu-compatible)
        - mako                              # Notification daemon
        - xdg-desktop-portal-hyprland       # Hyprland portal backend
        - xdg-desktop-portal-gtk            # GTK portal backend (file picker etc.)

        # Display Manager
        - ly                                # TUI display manager

        # Terminal
        - foot                              # Lightweight Wayland-native terminal

        # Screenshot tooling
        - grim                              # Wayland screenshot tool
        - slurp                             # Region selection for grim

        # Polkit & Auth
        - xfce-polkit                      # Polkit agent (works outside GNOME)

        # Audio (PipeWire stack — likely present in base, listed explicitly)
        - pipewire
        - pipewire-alsa
        - pipewire-pulseaudio
        - wireplumber
        - playerctl                         # MPRIS media key control

        # System tray networking
        - network-manager-applet

        # Input/brightness utilities
        - brightnessctl

        # GTK/GNOME utilities (all work under Hyprland)
        - gnome-keyring                     # Password/Key Management
        - gnome-disk-utility                # Disks app
        - baobab                            # Directory tree analyser
        - gnome-font-viewer                 # Font viewer/installer
        - ranger                            # File manager
        - gvfs                              # Virtual filesystem (Trash/Mounts)
        - dconf                             # Used by many GTK apps

        # Key Utilities
        - distrobox                         # Container-based system management
        - host-spawn                        # distrobox-host-exec dep
        - steam                             # Primary gaming platform

        # Misc Utilities
        - micro                             # TUI text editor
        - curl                              # CLI for HTTP transfer/download
        - wget                              # The other CLI for HTTP transfer/download
        - git                               # Version control system
        - yt-dlp                            # CLI media downloader
        - ffmpeg                            # Suite of media processing libraries
        - fastfetch                         # System information readout
        - rsync                             # Network file syncing
        - rclone                            # Cloud storage rsync

        # Networking
        - NetworkManager-wifi               # Primary WiFi tooling

        # X11 (for debugging Flatpak/XWayland issues)
        - xprop
        - xlsclients
        - xdotool

        # Podman
        - podman
        - podman-compose                    # Fallback CLI if ever needed
        - slirp4netns                       # Rootless networking
        - fuse-overlayfs                    # Rootless storage driver

        # Plymouth
        - plymouth
        - plymouth-system-theme
        - plymouth-plugin-two-step

        # AppImages
        - vulkan-loader
        - vulkan-tools

        # Bazaar runtime dependencies
        - gtk4
        - libadwaita
        - libdex
        - flatpak
        - appstream
        - json-glib
        - libsoup3
        - libxmlb
        - libyaml
        - webkitgtk6.0
        - libsecret
        - openssl-libs
        - glycin-loaders
        - md4c
        - glycin-gtk4-libs
        - libgweather4

    remove:
      packages:
        - toolbox
        - htop

  - type: script
    scripts:
      - build-bazaar.sh
      - setup-podman.sh
      - setup-os-release.sh
      # dconf-update.sh omitted — no GNOME dconf defaults to push

  - type: systemd
    system:
      enabled:
        - ly.service
        # gdm.service removed

  - type: default-flatpaks
    configurations:
      - scope: user
        repo:
          title: Flathub (user)
      - notify: true
        scope: system
        repo:
          title: Flathub (system)
        install:

            # System management
            - com.github.tchx84.Flatseal
            - com.ranfdev.DistroShelf
            - io.github.flattool.Ignition
            - com.vysp3r.ProtonPlus
            - com.github.mtkennerly.ludusavi
            - com.usebottles.bottles
            - me.timschneeberger.jdsp4linux

            # Media
            - io.github.celluloid_player.Celluloid
            - org.qbittorrent.qBittorrent

  - type: fonts
    fonts:
      google-fonts:
        - Inter

  # Plymouth theming
  - type: initramfs

  - type: signing