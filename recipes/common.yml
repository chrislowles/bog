---
modules:

  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:

        # COSMIC Core
        - cosmic-session
        - cosmic-comp
        - cosmic-settings
        - cosmic-settings-daemon
        - cosmic-launcher
        - cosmic-notifications
        - cosmic-panel
        - cosmic-term
        - cosmic-bg
        - cosmic-applets
        - xdg-desktop-portal-cosmic
        - cosmic-greeter                    # Login Manager
        - cosmic-osd                        # OSD
        - cosmic-idle                       # Idle daemon
        - cosmic-files                      # File manager
        - cosmic-edit                       # GUI Text editor
        - cosmic-store                      # Software center

        # Filesystem
        - gvfs                              # Virtual Filesystem (Trash/Mounts)
        - gvfs-client                       # Client modules of backends for the gio framework in GLib
        - gvfs-archive                      # Archiving support for gvfs
        - gvfs-afc                          # AFC support for gvfs
        - gvfs-afp                          # AFP support for gvfs
        - gvfs-fuse                         # FUSE support for gvfs
        - gvfs-goa                          # GOA support for gvfs
        - gvfs-gphoto2                      # gphoto2 support for gvfs
        - gvfs-mtp                          # MTP support for gvfs
        - gvfs-nfs                          # NFS support for gvfs
        - gvfs-smb                          # SMD support for gvfs

        # Essential Interface & Tools
        - gnome-disk-utility                # GNOME Disks (No 1:1 COSMIC utility yet)

        # System Management Beyond Flatpaks (idk how to describe this lol)
        - distrobox                         # Container-based system management
        - host-spawn                        # distrobox-host-exec dep
        - steam                             # Primary gaming platform
        - system-reinstall-bootc            # Effective system reset via bootc

        # Misc
        - micro                             # TUI Text Editor
        - git                               # Version control system
        - curl                              # CLI for http transfer/download
        - wget                              # The other CLI for http transfer/download
        - yt-dlp                            # CLI media downloader
        - ffmpeg                            # Suite of media processing libraries
        - rsync                             # Common program for network syncing files
        - rclone                            # Cloud storage management
        - fastfetch                         # System information readout (neofetch-like)

        # Networking
        - NetworkManager-wifi               # Primary tooling for WiFi support

        # X11 (mostly for debugging when patching/pre-configuring fixes for flatpaks)
        - xprop
        - xlsclients
        - xdotool

        # Podman
        - podman                            # Should already be present on uBlue base, explicit just in case
        - podman-compose                    # Fallback CLI if ever needed
        - slirp4netns                       # Rootless networking
        - fuse-overlayfs                    # Rootless storage driver

        # Plymouth
        - plymouth
        - plymouth-system-theme
        #- plymouth-plugin-two-step

        # AppImages
        #- fuse # FUSE 3 (likely already present in base)
        #- fuse2 # needed by most AppImages anyway
        - vulkan-loader
        - vulkan-tools

        # Broad system runtime dependencies (formerly source-built Bazaar dependencies)
        - flatpak
        - appstream
        - libsoup3
        - json-glib
        - libsecret
        - libxmlb
        - libyaml

    remove:
      packages:
        - toolbox
        - htop
        #- fedora-release-identity-basic
        #- fedora-logos
        - fedora-bookmarks

  - type: script
    scripts:
      - setup-podman.sh
      - setup-os-release.sh

  - type: systemd
    user:
      enabled:
        # Noticed a quirk with Bazaar when experimenting with the default-flatpaks key,
        # clearing cache after reverting fixed it so I'm setting as a user service.
        # Basically a cache clear is now intended to be apart of an image update/upgrade now.
        # TODO: consider user and system versions of these services/scripts
        - springclean.service
    system:
      enabled:
        - cosmic-greeter.service

  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:

            # Suggested pre-installed system programs
            - com.github.tchx84.Flatseal
            - com.ranfdev.DistroShelf
            #- com.mattjakeman.ExtensionManager  # Removed as GNOME extensions are incompatible with COSMIC
            - com.vysp3r.ProtonPlus

  # Plymouth theming stuff
  - type: initramfs

  - type: signing