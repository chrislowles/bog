# Monitors
monitor = , preferred, auto, 1

# Programs
$terminal = foot
$menu = wofi --show drun

# Autostart
exec-once = hyprpaper
exec-once = waybar
exec-once = mako
exec-once = nm-applet --indicator
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = gnome-keyring-daemon --start --components=secrets,pkcs11

# Environment
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Input
input {
    kb_layout  = us
    follow_mouse = 1
    sensitivity  = 0

    touchpad {
        natural_scroll    = yes
        disable_while_typing = yes
    }
}

# General
general {
    gaps_in  = 1
    gaps_out = 2
    border_size = 2
    col.active_border   = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# Decoration
decoration {
    rounding = 8

    blur {
        enabled = true
        size    = 3
        passes  = 1
    }

    drop_shadow        = yes
    shadow_range       = 4
    shadow_render_power = 3
}

# Animations
animations {
    enabled = yes
    bezier  = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows,    1, 7,  myBezier
    animation = windowsOut, 1, 7,  default, popin 80%
    animation = border,     1, 10, default
    animation = fade,       1, 7,  default
    animation = workspaces, 1, 6,  default
}

# Layouts
dwindle {
    pseudotile     = yes
    preserve_split = yes
}

# Window rules
windowrule = float, ^(org.gnome.Nautilus)$
windowrule = float, ^(gnome-disks)$
windowrule = float, ^(org.gnome.baobab)$
windowrule = float, ^(gnome-font-viewer)$

# Keybindings
$mainMod = SUPER

# Core
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, Space, togglefloating

# Focus
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Move windows
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Workspaces
bind = $mainMod,       1, workspace,       1
bind = $mainMod,       2, workspace,       2
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2

# Mouse window management
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = ,       Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = SHIFT,  Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Media keys
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous

# Brightness (laptop)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Lock screen
bind = $mainMod, L, exec, hyprlock