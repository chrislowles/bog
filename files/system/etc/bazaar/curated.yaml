css: |
  .bog-section banner {
     margin-top: 30px;
     margin-left: 30px;
     margin-right: 30px;
     border-radius: 10px;
  }
  .bog-section banner-text-overlay {
     margin: 30px;
     padding: 20px;
  }
  .bog-section banner-text {
     padding: 50px;
  }
  .bog-section subtitle {
    font-weight: 400;
  }
  .bog-section subtitle,
  .bog-section title,
  .bog-section banner-text {
    color: #FFF;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
  }
  .bog-section {
    margin: 15px;
    border-radius: 25px;
  }

