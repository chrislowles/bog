css: |
  .bog-section banner {
     margin-top: 30px;
     margin-left: 30px;
     margin-right: 30px;
     border-radius: 10px;
  }
  .bog-section banner-text-overlay {
     margin: 30px;
     padding: 20px;
  }
  .bog-section banner-text {
     padding: 50px;
  }
  .bog-section subtitle {
    font-weight: 400;
  }
  .bog-section subtitle,
  .bog-section title,
  .bog-section banner-text {
    color: #FFF;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
  }
  .bog-section {
    margin: 15px;
    border-radius: 25px;
  }
  .gnome-section {
    background: linear-gradient(135deg, #3584E4, #1A5AB5);
  }
  .gaming-section {
    background: linear-gradient(135deg, #5C5A5E, #343234);
  }
  .browsers-section {
    background: linear-gradient(135deg, #33D17A, #1A9655);
  }
  .office-section {
    background: linear-gradient(135deg, #1C71D8, #0F459E);
  }
  .creative-section {
    background: linear-gradient(135deg, #E66100, #B84C00);
  }
  .social-section {
    background: linear-gradient(135deg, #E01B24, #A01018);
  }
  .media-section {
    background: linear-gradient(135deg, #9141AC, #642D7A);
  }
  .system-section {
    background: linear-gradient(135deg, #2190A4, #145F6E);
  }
  .misc-section {
    background: linear-gradient(135deg, #7A7A80, #4A4A50);
  }

