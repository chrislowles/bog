yaml-blocklist-paths:
  - /run/host/etc/bazaar/blocklist.yaml

curated-config-paths:
  # /run/host/etc/bazaar/config.yaml seems to be a default and writing it in results in the curated file getting added in twice, maybe we can omit this all together but we need something if we're to organize in the future
  - /run/host/etc/bazaar/curated.yaml

override-eol-markings:
  - com.obsproject.Studio

hooks:
  - id: welcome
    when: before-transaction
    dialogs:
      - id: welcome-dialog
        title: "Welcome to bog!"
        body: ":))))))))))))))"